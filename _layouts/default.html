<!DOCTYPE html>{% if page.lang == "en"%}
{% assign language = "en-US" %}
{% else %}
{% assign language = "pt-BR" %}
{% endif %}
<html lang="{{ language }}">
  {% include head.html %}
  <body>
    <script>
      // Apply the theme before first paint to avoid a flash of the
      // wrong theme (and the load-time color transition).
      (function () {
        var theme = localStorage.getItem('theme') ||
          (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.body.setAttribute('data-theme', theme);
      })();
    </script>
    {% include header.html %}

    <div class="page-content">
      <div class="wrapper">
        {{ content }}
      </div>
    </div>

    {% include footer.html %}
    {% include analytics.html %}
    <script src="{{ '/js/dark-mode.js' | relative_url }}"></script>
    <script src="{{ '/js/copy-code.js' | relative_url }}"></script>
  </body>

</html>
